apiVersion: v1
kind: ConfigMap
metadata:
  name: marketplace-config
  namespace: marketplace
data:
  OTLP_ENDPOINT: http://otel-collector:4317
  ASPNETCORE_URLS: http://+:8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: marketplace
data:
  ReverseProxy__Clusters__identity-cluster__Destinations__d1__Address: http://identity-api:8080/
  ReverseProxy__Clusters__catalog-cluster__Destinations__d1__Address: http://catalog-api:8080/
  ReverseProxy__Clusters__cart-cluster__Destinations__d1__Address: http://cart-api:8080/
  ReverseProxy__Clusters__order-cluster__Destinations__d1__Address: http://order-api:8080/
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-api
  namespace: marketplace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-api
  template:
    metadata:
      labels:
        app: identity-api
    spec:
      containers:
        - name: identity-api
          image: mymarketplace/identity-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              valueFrom:
                configMapKeyRef:
                  name: marketplace-config
                  key: ASPNETCORE_URLS
            - name: OpenTelemetry__OtlpEndpoint
              valueFrom:
                configMapKeyRef:
                  name: marketplace-config
                  key: OTLP_ENDPOINT
            - name: ConnectionStrings__Postgres
              value: Host=postgres-identity;Port=5432;Database=identitydb;Username=postgres;Password=postgres
            - name: ConnectionStrings__RabbitMq
              valueFrom:
                secretKeyRef:
                  name: marketplace-secrets
                  key: RABBITMQ_CONNECTION
            - name: Jwt__Secret
              valueFrom:
                secretKeyRef:
                  name: marketplace-secrets
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: identity-api
  namespace: marketplace
spec:
  selector:
    app: identity-api
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: identity-api
  namespace: marketplace
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: identity-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
---
